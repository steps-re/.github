# Canonical pre-commit config for steps-re repos.
# Copy this file to your repo root as `.pre-commit-config.yaml`, then:
#   pip install pre-commit
#   pre-commit install
#   pre-commit run --all-files   # first run, to baseline the repo
#
# Keep this file in sync with steps-re/.github/templates/.pre-commit-config.yaml
# rather than hand-editing divergent copies per repo.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.4
    hooks:
      - id: actionlint

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
