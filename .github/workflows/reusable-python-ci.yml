name: Reusable Python CI

# Shared CI for steps-re Python repos.
# Consuming repos call this via `jobs.<name>.uses:` — see README.md for the
# copy-paste adoption snippet. Fix it here once, every repo gets the fix.

on:
  workflow_call:
    inputs:
      python-versions:
        description: >-
          JSON array (as a string) of Python versions to test against,
          e.g. '["3.11","3.12"]'.
        type: string
        default: '["3.11","3.12"]'
      run-typecheck:
        description: "Run mypy type-checking if a mypy config is present."
        type: boolean
        default: false
      package-manager:
        description: "Package manager to use for installs. Currently supports 'pip'."
        type: string
        default: "pip"

# Least-privilege default. Individual jobs elevate only where required
# (e.g. secret-scan needs contents:read only; nothing here needs write).
permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for ruff config
        id: ruff_cfg
        run: |
          if [ -f "pyproject.toml" ] && grep -q "\[tool.ruff\]" pyproject.toml; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          elif [ -f "ruff.toml" ] || [ -f ".ruff.toml" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ruff
        if: steps.ruff_cfg.outputs.found == 'true'
        run: |
          python -m pip install --upgrade pip ruff
          ruff check .

      - name: Skip ruff (no config found)
        if: steps.ruff_cfg.outputs.found == 'false'
        run: echo "No ruff config found (pyproject.toml [tool.ruff], ruff.toml, or .ruff.toml). Skipping lint."

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        env:
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
        run: |
          python -m pip install --upgrade pip
          if [ "$PACKAGE_MANAGER" != "pip" ]; then
            echo "package-manager '$PACKAGE_MANAGER' not yet supported by this reusable workflow; falling back to pip."
          fi
          # Install whatever deps the repo declares (any/all of these may exist).
          for req in requirements.txt requirements-dev.txt test-requirements.txt dev-requirements.txt; do
            [ -f "$req" ] && { echo "Installing $req"; pip install -r "$req" || echo "WARN: $req install had errors; continuing."; }
          done
          # Install the package itself if it's packaged (try common test/dev extras).
          if [ -f "pyproject.toml" ] || [ -f "setup.py" ] || [ -f "setup.cfg" ]; then
            pip install -e ".[test]" 2>/dev/null \
              || pip install -e ".[dev]" 2>/dev/null \
              || pip install -e . 2>/dev/null \
              || echo "WARN: editable install failed; continuing (deps may have come from requirements files)."
          fi
          # Always ensure pytest is present — extras groups don't reliably provide it,
          # and `pip install -e '.[test]'` does NOT error when the 'test' extra is absent.
          pip install pytest

      - name: Optional type-check (mypy)
        if: inputs.run-typecheck == true
        run: |
          if [ -f "mypy.ini" ] || [ -f ".mypy.ini" ] || (test -f pyproject.toml && grep -q "\[tool.mypy\]" pyproject.toml); then
            pip install mypy
            mypy .
          else
            echo "run-typecheck was true but no mypy config found. Skipping."
          fi

      - name: Run pytest
        run: |
          if [ -d "tests" ] || [ -d "test" ] || compgen -G "test_*.py" > /dev/null || compgen -G "*_test.py" > /dev/null; then
            pytest
          else
            echo "No tests directory or test_*.py files found. Nothing to run."
          fi

  secret-scan:
    name: secret-scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Run the gitleaks binary directly against the checkout (full history via
      # fetch-depth: 0). This avoids gitleaks-action's PR-commits API call, which
      # needs `pull-requests: read` from the caller — the binary needs no extra
      # token permissions, so adopters keep the minimal `contents: read`.
      - name: Run gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(curl -sSfL -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
          echo "Using gitleaks v$VERSION"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . --redact --exit-code 1

  lint-actions:
    name: lint-actions (actionlint + zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for workflows
        id: wf_check
        run: |
          if [ -d ".github/workflows" ] && [ -n "$(ls -A .github/workflows 2>/dev/null)" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run actionlint
        if: steps.wf_check.outputs.found == 'true'
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error

      - name: Run zizmor
        if: steps.wf_check.outputs.found == 'true'
        run: |
          python -m pip install --upgrade pip zizmor
          # Default persona: catches real issues (template-injection, etc.) but
          # not pedantic-only audits like unpinned-uses — which would otherwise
          # flag every adopter's own `uses: steps-re/.github/...@main` line.
          zizmor .github/workflows/

      - name: Skip (no workflows found)
        if: steps.wf_check.outputs.found == 'false'
        run: echo "No .github/workflows directory found. Skipping actionlint/zizmor."
