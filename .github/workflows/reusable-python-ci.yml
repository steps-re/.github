name: Reusable Python CI

# Shared CI for steps-re Python repos.
# Consuming repos call this via `jobs.<name>.uses:` — see README.md for the
# copy-paste adoption snippet. Fix it here once, every repo gets the fix.

on:
  workflow_call:
    inputs:
      python-versions:
        description: >-
          JSON array (as a string) of Python versions to test against,
          e.g. '["3.11","3.12"]'.
        type: string
        default: '["3.11","3.12"]'
      run-typecheck:
        description: "Run mypy type-checking if a mypy config is present."
        type: boolean
        default: false
      package-manager:
        description: "Package manager to use for installs. Currently supports 'pip'."
        type: string
        default: "pip"

# Least-privilege default. Individual jobs elevate only where required
# (e.g. secret-scan needs contents:read only; nothing here needs write).
permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for ruff config
        id: ruff_cfg
        run: |
          if [ -f "pyproject.toml" ] && grep -q "\[tool.ruff\]" pyproject.toml; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          elif [ -f "ruff.toml" ] || [ -f ".ruff.toml" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ruff
        if: steps.ruff_cfg.outputs.found == 'true'
        run: |
          python -m pip install --upgrade pip ruff
          ruff check .

      - name: Skip ruff (no config found)
        if: steps.ruff_cfg.outputs.found == 'false'
        run: echo "No ruff config found (pyproject.toml [tool.ruff], ruff.toml, or .ruff.toml). Skipping lint."

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        env:
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
        run: |
          python -m pip install --upgrade pip
          if [ "$PACKAGE_MANAGER" != "pip" ]; then
            echo "package-manager '$PACKAGE_MANAGER' not yet supported by this reusable workflow; falling back to pip."
          fi
          if [ ! -f "pyproject.toml" ] && [ ! -f "setup.py" ] && [ ! -f "setup.cfg" ]; then
            echo "No pyproject.toml/setup.py/setup.cfg found; nothing to install as a package. Installing pytest only."
            pip install pytest
          else
            pip install -e ".[test]" || (pip install -e . && pip install pytest)
          fi

      - name: Optional type-check (mypy)
        if: inputs.run-typecheck == true
        run: |
          if [ -f "mypy.ini" ] || [ -f ".mypy.ini" ] || (test -f pyproject.toml && grep -q "\[tool.mypy\]" pyproject.toml); then
            pip install mypy
            mypy .
          else
            echo "run-typecheck was true but no mypy config found. Skipping."
          fi

      - name: Run pytest
        run: |
          if [ -d "tests" ] || [ -d "test" ] || compgen -G "test_*.py" > /dev/null || compgen -G "*_test.py" > /dev/null; then
            pytest
          else
            echo "No tests directory or test_*.py files found. Nothing to run."
          fi

  secret-scan:
    name: secret-scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  lint-actions:
    name: lint-actions (actionlint + zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for workflows
        id: wf_check
        run: |
          if [ -d ".github/workflows" ] && [ -n "$(ls -A .github/workflows 2>/dev/null)" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run actionlint
        if: steps.wf_check.outputs.found == 'true'
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error

      - name: Run zizmor
        if: steps.wf_check.outputs.found == 'true'
        run: |
          python -m pip install --upgrade pip zizmor
          zizmor --persona=pedantic .github/workflows/

      - name: Skip (no workflows found)
        if: steps.wf_check.outputs.found == 'false'
        run: echo "No .github/workflows directory found. Skipping actionlint/zizmor."
